<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --cream: #F5E8DA; --sand: #EBD5BD; --peach: #E8C5A8;
  --terracotta: #C97B5C; --copper: #B8643F; --terra-deep: #8B4A2E;

html, body { background: var(--cream); color: var(--text); font-family: var(--sans); font-weight: 400; line-height: 1.65; -webkit-font-smoothing: antialiased; min-height: 100vh; }

.topbar { background: var(--warm-brown); padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 16px; }
.topbar-brand { font-family: var(--display); font-style: italic; font-size: 20px; font-weight: 500; color: var(--cream); }
.topbar-divider { color: rgba(245, 232, 218, 0.3); font-weight: 200; }
.topbar-section { font-size: 11px; font-weight: 600; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(245, 232, 218, 0.7); }
.topbar-tabs { display: flex; gap: 4px; }
.topbar-tab { font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(245, 232, 218, 0.65); padding: 8px 18px; border-radius: 6px; cursor: pointer; transition: all 150ms; }
.topbar-tab:hover { background: rgba(245, 232, 218, 0.1); color: var(--cream); }
.topbar-tab.active { background: var(--terracotta); color: #fff; }
.topbar-badge { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(245, 232, 218, 0.55); padding: 4px 10px; border: 1px solid rgba(245, 232, 218, 0.2); border-radius: 100px; }

.body-wrap { display: grid; grid-template-columns: 320px 1fr; }
.sidebar { background: linear-gradient(180deg, var(--sand) 0%, var(--peach) 100%); border-right: 1px solid var(--border-strong); padding: 24px 20px; height: calc(100vh - 50px); overflow-y: auto; position: sticky; top: 50px; }

.sidebar-section-label { font-size: 10px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--copper); margin-bottom: 12px; padding: 0 4px; }

.search-row { position: relative; margin-bottom: 18px; }
.search-box { width: 100%; background: rgba(255, 255, 255, 0.75); border: 1px solid var(--border-strong); border-radius: 8px; padding: 10px 14px 10px 36px; font-family: var(--sans); font-size: 13px; color: var(--text); transition: all 150ms; }
.search-box:focus { outline: none; border-color: var(--terracotta); background: #fff; }
.search-box::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }

.doc-link { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 12px; font-size: 13px; color: var(--text); text-decoration: none; border-radius: 6px; cursor: pointer; margin-bottom: 2px; transition: all 100ms; line-height: 1.4; }
.doc-link:hover { background: rgba(255, 255, 255, 0.5); color: var(--terra-deep); }
.doc-link.active { background: var(--terracotta); color: #fff; font-weight: 500; }
.doc-link.active .status { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.4); }
.doc-link.hidden { display: none; }
.status { font-size: 9px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 6px; border-radius: 100px; border: 1px solid var(--border-strong); color: var(--text-soft); white-space: nowrap; }
.status.draft { color: var(--copper); border-color: var(--copper); }
.status.live { color: #2D7A4A; border-color: #2D7A4A; background: #D9F0E0; }

.doc-title { font-family: var(--display); font-weight: 400; font-size: clamp(32px, 4vw, 48px); line-height: 1.05; letter-spacing: -0.3px; color: var(--warm-brown); margin-bottom: 14px; }

.content ul, .content ol { margin: 0 0 18px 22px; }
.content li { margin-bottom: 5px; line-height: 1.7; }
.content strong { font-weight: 600; color: var(--terra-deep); }
.content em { color: var(--text-soft); font-style: italic; }
.content code { background: rgba(184, 100, 63, 0.1); color: var(--terra-deep); padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 13px; }
.content blockquote { border-left: 3px solid var(--terracotta); padding: 12px 16px 12px 18px; margin: 18px 0; color: var(--text-soft); background: rgba(255,255,255,0.5); border-radius: 0 6px 6px 0; font-style: italic; }
.content table { border-collapse: collapse; width: 100%; margin: 18px 0; font-size: 14px; background: rgba(255, 255, 255, 0.5); border-radius: 8px; overflow: hidden; }
.content th, .content td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
.content th { background: var(--sand); color: var(--warm-brown); font-weight: 600; font-size: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
.content tr:last-child td { border-bottom: none; }
.content a { color: var(--copper); text-decoration: underline; text-decoration-color: rgba(184, 100, 63, 0.4); text-underline-offset: 2px; word-break: break-word; }
.content a:hover { color: var(--terra-deep); }
.content hr { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

.draft-banner { background: rgba(201, 123, 92, 0.15); border-left: 3px solid var(--terracotta); padding: 14px 18px; border-radius: 0 6px 6px 0; margin-bottom: 24px; font-size: 13px; color: var(--terra-deep); }
.draft-banner strong { color: var(--terracotta); }

.quick-links { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; margin-top: 24px; }
.quick-link { background: rgba(255, 255, 255, 0.6); border: 1px solid var(--border-strong); border-radius: 10px; padding: 18px; text-decoration: none; color: var(--text); transition: all 150ms; display: block; }
.quick-link:hover { border-color: var(--terracotta); background: #fff; transform: translateY(-2px); }
.quick-link-title { font-weight: 600; color: var(--terra-deep); margin-bottom: 4px; font-size: 14px; }
.quick-link-desc { font-size: 12px; color: var(--text-soft); }

@media (max-width: 900px) {
  .body-wrap { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; top: 0; }
  .main { padding: 28px 20px 64px; }
  .topbar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
}

.auth-gate { position: fixed; inset: 0; background: linear-gradient(135deg, var(--warm-brown) 0%, var(--terra-deep) 100%); z-index: 99999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.auth-modal { background: var(--cream); padding: 56px 56px; border-radius: 16px; max-width: 440px; width: 100%; text-align: center; box-shadow: 0 30px 80px rgba(0,0,0,0.4); }
.auth-brand { font-family: var(--display); font-style: italic; font-size: 28px; font-weight: 500; color: var(--warm-brown); margin-bottom: 4px; }
.auth-sub { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--copper); margin-bottom: 28px; }
.auth-modal p { color: var(--text-soft); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
.auth-modal input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--border-strong); border-radius: 8px; font-size: 14px; font-family: var(--sans); margin-bottom: 16px; background: #fff; color: var(--text); }
.auth-modal input:focus { outline: none; border-color: var(--terracotta); }
.auth-modal button { background: var(--terracotta); color: #fff; padding: 14px 32px; border-radius: 8px; font-weight: 600; font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase; border: none; cursor: pointer; font-family: var(--sans); width: 100%; transition: background 150ms; }
.auth-modal button:hover { background: var(--copper); }
.auth-error { color: #B83F3F; font-size: 12px; margin-top: 12px; font-weight: 500; min-height: 18px; }

</style>

<script id="docs-data" type="application/json">[{"id": "home-welcome", "role": "Home", "title": "Welcome + Daily Essentials", "content": "# Welcome to the Wesnoski Team Hub\n\nThis is your operating system. Setters and closers. Every SOP, script, link, and decision rule lives here. When something changes, this is the source of truth, not Slack, not a screenshot, not a half-remembered conversation.\n\n> If you can't find the answer here, you ask Farren directly. Then we add it here so nobody has to ask again.\n\n## What you'll find\n\n- **Setter SOPs** for daily DM work, lead qualification, booking flow\n- **Closer SOPs** for discovery calls, pricing, objections, post-call\n- **Resources** with every live link you need: application form, booking calendar, payment, brochures, brand voice\n- **Brand Voice** reference so every message you send sounds like Wesnoski Coaching\n\n## Daily essentials\n\n- Application form: https://info.wesnoskicoaching.com/application\n- Pre-call page (send to booked leads): https://discover.wesnoskicoaching.com\n- Main site: https://www.wesnoskicoaching.com\n- Community: https://whop.com/wesnoski-coaching-9\n\n## How this hub gets updated\n\nFarren is the only editor. If you spot something stale, broken, or missing, message him directly. He updates the source files and pushes the change. The site refreshes within a minute.\n", "status": "live"}, {"id": "set-role", "role": "Setter", "title": "Role Overview", "content": "# Setter · Role Overview\n\n## What a setter does\n\nSetters live in DMs. The job is simple:\n\n1. Respond to inbound interest (story replies, ad comments, new follows, content engagement)\n2. Run the conversation through the L.E.A.D. framework (see DM Scripts)\n3. Qualify the lead (research mode or support mode)\n4. Book qualified leads onto the closer's calendar\n\nThat is the whole job.\n\n## What a setter does NOT do\n\n- **Never quote price.** Pricing comes up on the call, not in DM.\n- **Never run discovery.** Discovery is the closer's job.\n- **Never close.** You don't pitch the program.\n- **Never send payment links.** Closer territory.\n- **Never give clinical advice.** Coach Farren's lane.\n\n## What success looks like\n\nThe setter's job ends when:\n- The call is booked in the calendar\n- Lead email + phone are captured in AR Funnel\n- The closer has been notified in the team chat\n- The lead has been marked Booked in IG and added to the tracker\n\nIf all of that is done, you did your job. The call itself is the closer's problem.\n\n## Daily target\n\n15 to 75 outbound messages per shift. Spread them out (5 to 10 every 30 to 60 minutes). Don't blast. Quality + pacing matters.\n\n## When in doubt\n\nTag Coach Farren in the team chat with a screenshot. Wait for the reply. Then respond to the lead with: \"I sent this over to Coach for some feedback and they said...\"\n\nNever guess on clinical questions. Never invent pricing. Never improvise the booking flow.\n", "status": "live"}, {"id": "set-daily", "role": "Setter", "title": "Daily Workflow", "content": "# Setter · Daily Workflow\n\n## Tools you'll be working in\n\n- **Meta Business Suite** — your primary inbound for IG and FB DMs, story replies, comments, new followers. This is where you live.\n- **AR Funnel** — for booking calls, contact records, pipeline tracking\n- **Wesnoski DM Setter GPT** — your assistant for drafting replies in brand voice and handling questions you're stuck on. [https://chatgpt.com/g/g-69d994900e9c8191a31dd963642c9638-wesnoski-dm-setter](https://chatgpt.com/g/g-69d994900e9c8191a31dd963642c9638-wesnoski-dm-setter). The GPT is trained on the L.E.A.D. framework, the booking flow, the doorway question, and all the voice rules. Use it when you want a second opinion on phrasing or when a lead asks something outside the standard flow. Never paste the GPT's output verbatim without reading it. You're the human, the GPT is the draft.\n- **Team chat** — for tagging Coach Farren when you need help that the GPT can't cover\n\n## Start-of-shift checklist\n\n### 1. Check stories + posts\nScan the latest IG and FB stories, reels, and posts (Meta Business Suite has this in one feed). Note the themes (gut, hormones, thyroid, fatigue, perimenopause, etc). This is what's currently being talked about, which means leads will reference it.\n\n### 2. Confirm new-follower DM automation is firing\n\nThe new-follower welcome DM is automated. Your job is to **spot-check** that it actually went out. Scan recent followers in Meta Business Suite. If anyone slipped through without the auto-DM, send it manually.\n\n### 3. Respond to all current conversations\nClear out active DMs first. Prioritize warm and hot leads who are mid-convo. Don't start new convos with old ones still open.\n\n### 4. Check ad comments\nRecent ad and reel comments. DM anyone showing interest:\n\n> \"Hey, this is [Name], Coach Farren's liaison. Saw your comment, glad you're here. What are you working on that brought you to the page?\"\n\n### 5. Message new likes + follows\nMeta Business Suite notification feed. Look for new follows, likes on recent posts, story views. Prioritize profiles that match our case shape (autoimmune, hormones, thyroid, gut, perimenopause, postpartum, post-mold, post-Lyme).\n\nOpener:\n\n> \"Hey, this is [Name], Coach Farren's liaison. Happy to connect. What brought you to the page? Are you working toward any specific goals?\"\n\n### 6. Follow-ups\nUnanswered pitches, \"thinking on it\" convos, ghosted leads who were once warm. Prioritize pitches and hot leads.\n\n### 7. Tag Coach Farren when needed\nIf a lead asks something technical or clinical and you're not sure, tag Coach in the team chat with a screenshot. When they reply, message the lead:\n\n> \"I sent this over to Coach for some feedback and they said...\"\n\nIn the team chat, ❤️ the message Coach sent once you respond.\n\nIf Coach hasn't replied to a previous-day question, re-tag with: \"I think this may have gotten lost, just wanted to drop it back down.\"\n\n## Pacing\n\n- Daily target: **minimum 50 outbound messages per shift.**\n- If a conversation is moving, stay in it. Don't artificially pause to space outbounds.\n- If you're behind on responses, prioritize replying over starting new convos.\n\n## KPIs we track\n\nEvery shift, track:\n\n- **Messages** (total outbound + total replies)\n- **New leads** (new conversations started with profiles matching ideal client)\n- **Calls booked**\n\nThese three are the only numbers that matter. Everything else is noise.\n\n## End-of-shift\n\nSubmit EOD report (see Reporting SOP).\n", "status": "live"}, {"id": "set-scripts", "role": "Setter", "title": "DM Scripts", "content": "# Setter · DM Scripts\n\n## The framework: L.E.A.D.\n\nEvery DM conversation runs through this:\n\n- **L — Listen.** Don't move forward until you understand why they're here, what's not working, how aware they are of the problem.\n- **E — Explore.** Turn surface-level interest into real context. Expand their awareness, don't diagnose.\n- **A — Align.** Reflect back what you heard. This is where trust gets built.\n- **D — Direct.** Clear next step. Invite to the call. Ask for logistics immediately.\n\nYou don't move forward until each step lands. If you rush, the conversation collapses.\n\n## Opener\n\n> \"Appreciate the follow, [Name]. What about the content brought you in?\"\n\nOr if responding to a story reply or comment:\n\n> \"Hey, this is [Name], Coach Farren's liaison. Saw your comment. What are you working on that brought you here?\"\n\n## Goals\n\nAfter they reply to the opener:\n\n> \"Got it. What are the main goals you're hoping to work toward right now?\"\n\nAcknowledge their answer briefly. \"Makes sense.\" \"That's a real one.\"\n\n## Challenges\n\n> \"What do you feel has been the biggest thing holding you back or getting in the way?\"\n\nThis is the LISTEN step. Wait for them to talk. Don't rush. Dig if needed:\n\n> \"How long has that been going on?\"\n> \"Tell me more about that.\"\n\n## Day-to-day + work\n\n> \"What does your day typically look like? And what do you do for work, is it more mentally demanding, physically demanding, or a mix?\"\n\nThis gives you context on stress load, schedule, lifestyle constraints.\n\n## Tried\n\n> \"What all have you tried so far to work toward [their goal]?\"\n\nThis is critical. It reveals what's failed and why. Coach Farren will use this on the call.\n\n## Align\n\nBefore you pitch the call, reflect back what they shared:\n\n> \"So if I'm understanding correctly, you're dealing with [their challenge], you've tried [what they listed], and what you really want is [their goal]. Did I get that right?\"\n\nWait for confirmation.\n\n## The pitch (book the call)\n\n> \"From what you shared, I think Coach Farren can help you. The next step would be a Zoom call. No pressure, it's a place to walk through how everything works, ask any questions, and figure out the best options for where you're at. Does that sound fair?\"\n\nOnce they say yes, move into the Booking Flow SOP.\n\n## Once you've pitched\n\n- Mark the lead in IG as \"Ordered\"\n- Ring the bell in the sales chat with: \"🔔 [Name] — 1:1 Coaching\"\n\n\n## When you get a clinical question\n\nIf a lead asks something medical or clinical that's outside the framework above, two options in this order:\n\n1. **Use the Wesnoski medical GPT** (link will be provided by Coach Farren). It's calibrated to our framework and can give you a brand-aligned answer.\n2. **If the GPT doesn't have it or the question is complex, tag Coach Farren in the team chat** with a screenshot. When he replies, paste back to the lead with: \"I sent this over to Coach for some feedback and they said...\"\n\nYou always stay inside the framework. You never improvise clinical answers.\n\n## What NOT to do\n\n- Don't pitch before LISTEN + EXPLORE + ALIGN are done\n- Don't quote pricing (that's the closer's job on the call)\n- Don't give clinical advice (tag Coach Farren)\n- Don't push someone who said they're in research mode (see Lead Qualification SOP)\n", "status": "live"}, {"id": "set-qual", "role": "Setter", "title": "Lead Qualification", "content": "# Setter · Lead Qualification\n\n## The doorway question\n\nOnce you've done LISTEN + EXPLORE + ALIGN (see DM Scripts), you ask the doorway question:\n\n> \"Are you looking for support, or are you still in research mode for now?\"\n\nThis question does two things:\n- Respects their pace. Some people are months away from being ready.\n- Surfaces real intent. The ones who say \"support\" are the ones we book.\n\n## If they say research mode\n\nStay warm. Send the relevant resources. Don't push.\n\n> \"Totally good. Coach Farren puts out a lot of content on [their interest area]. If you want to chat more down the line or have questions, don't hesitate to reach out.\"\n\nCheck back in a week if they were warm. Don't chase. Don't book them.\n\n## If they say support\n\nMove to the booking flow:\n\n> \"Great, the next step would be a Zoom call. Does that work for you?\"\n\nThen run the full booking flow SOP.\n\n## Who you're qualifying for\n\nA lead is qualified for a call when:\n\n1. They expressed real interest (not just curiosity)\n2. They have an actual goal they're working toward\n3. They have tried something before and it hasn't worked (this is where Coach Farren's value lands)\n4. They said \"support\" at the doorway question\n\nIf any of these is missing, slow down. Re-run LISTEN.\n\n## Who you don't book\n\n- Pure research mode (they said it themselves)\n- \"Just checking out the content\" (use the canned reply, not the booking flow)\n- Anyone asking about something we don't do (we don't coach pregnant women, we don't coach pure aesthetic prep without a health case, etc.)\n- Emotional crisis (this is mental health territory, not coaching)\n\nWhen in doubt, tag Coach Farren in the chat.\n", "status": "live"}, {"id": "set-book", "role": "Setter", "title": "Booking Flow", "content": "# Setter · Booking Flow\n\nThis SOP covers the DM-to-booked-call flow. From the moment a lead expresses interest, to a confirmed appointment, with email + phone captured in AR Funnel, and the pre-call page sent.\n\n## The framing rule\n\nWhen a lead in DMs starts asking about coaching, you always offer them two doors:\n\n> \"Are you looking for support, or are you still in research mode for now?\"\n\nThis is the doorway question. It does two things:\n- It respects their pace. Some people are months away from buying.\n- It surfaces real intent. The leads who say \"support\" are the ones we book.\n\nIf they say research mode, you stay warm, send the relevant resources, and re-check on them in a week. Do not push.\n\nIf they say they want support, you move to the booking flow below.\n\n## Step-by-step\n\n### 1. Offer the call\n\nWhen they say they want support, reply:\n\n> \"Great, the next step would be a Zoom call. Does that work for you?\"\n\nWait for yes.\n\n### 2. Grab their time zone\n\nWhen they say yes:\n\n> \"Great. What is your time zone?\"\n\nOnce they answer, open AR Funnel:\n\n- Find the contact (Messages tab → click their name)\n- Right-hand sidebar → **Contact Details** → **General Info**\n- Type their time zone into the time zone field\n- **Save**\n\nIf their answer is ambiguous (they say something like \"central\" or a city you don't recognize), Google it to confirm. Don't guess.\n\n### 3. Open the calendar and find available times\n\nIn AR Funnel, find the **Appointments** tab. It looks like a small green and white calendar icon on the right-hand side of the browser.\n\n- Click **Appointments**\n- Click **Schedule an Appointment**\n- The contact's name will already be pulled in. The time zone will already be uploaded from step 2.\n- Look at the available slots.\n\n### 4. Offer times to the lead\n\nReply with 2 to 3 time options that work in their time zone. Example phrasing:\n\n> \"I've got a few times open this week. Tuesday 10 AM your time, Wednesday 2 PM your time, or Thursday 7 PM your time. Which works for you?\"\n\nWait for them to pick.\n\n### 5. Capture email and book the appointment\n\nOnce they confirm a time, ask for the email:\n\n> \"Perfect. What's the best email to send the calendar invite to?\"\n\nWhen they send the email, it auto-populates in AR Funnel. Just go to the Appointments tab and finalize the booking at the agreed time. The system handles the rest.\n\n### 6. Capture phone number for the Zoom link\n\nAfter the appointment is booked, send this:\n\n> \"Great, all booked. Can I please grab your phone number so I can text you the Zoom link before the call?\"\n\nWhen they send the phone number, it also auto-populates in their AR Funnel contact.\n\n### 7. Send the pre-call page\n\nThis step is non-negotiable. Every booked lead gets the pre-call page before the call.\n\nSend:\n\n> \"One more thing. If you don't mind, take a few minutes to check out this page before our call: https://discover.wesnoskicoaching.com\n>\n> Watch the video, read it through. It'll help you understand what we do at Wesnoski Coaching and make our call way more productive.\"\n\nThis primes them on the MARCH Method and Coach Farren before they show up. It's the difference between a cold call and a warm one.\n\n### 8. Confirm in the DM\n\nWrap with a warm confirmation:\n\n> \"Locked in for [day, date, time] your time. You'll get the Zoom link by text and the calendar invite by email. See you then.\"\n\n## Watch-outs\n\n- **Never book a call without the time zone confirmed.** If you assume a time zone wrong, the client misses the call and we look unreliable.\n- **Never skip the pre-call page send.** That single message is one of the biggest no-show prevention tools we have.\n- **Never skip the support-vs-research doorway question.** Pushing a research-mode lead burns the lead and the closer's calendar time.\n- **Email and phone both need to land in AR Funnel.** If either is missing, the automated text + calendar invite won't fire.\n- **If they go quiet between steps**, follow up once after 24 hours. After that, leave them. Don't chase.\n\n## Resources\n\n- AR Funnel Messages + Contact Details\n- Calendar / Appointments tab (right-hand sidebar in AR Funnel)\n- Pre-call page: https://discover.wesnoskicoaching.com\n", "status": "live"}, {"id": "set-obj", "role": "Setter", "title": "Objection Handling", "content": "# Setter · Objection Handling\n\n> Setter's job is to handle objections in DM only as far as needed to book the call. Pricing, program fit, deep clinical questions all get deferred to the call.\n\n## \"How much does it cost?\"\n\nYou never quote pricing in DM. Use this:\n\n> \"Pricing varies depending on what you actually need. There are no template plans here, it's about what makes the most sense for your case and your goals. If you feel aligned with what we do and confident we can help you get there, are you open to exploring what fits you on a call?\"\n\nIf they push:\n\n> \"The reason we don't drop pricing in DM is because the right tier depends on your case. The call is 30 minutes, no obligation, and you'll walk out knowing exactly what fits. Want to grab a time?\"\n\nIf they keep pushing for a number, they're not ready. Don't book them.\n\n## \"I'm overseas, will the exchange rate be a problem?\"\n\n> \"I know the exchange rate can make things feel trickier. Do you think that would be a major barrier for you moving forward?\"\n\nIf they say maybe, give them the price range on the call:\n\n> \"All good. The call gives us a chance to walk through what fits you specifically. Want to grab a time?\"\n\nAll overseas leads need to be flagged for the closer with the country + exchange context.\n\n## \"I'm not ready right now\"\n\n> \"Totally good. Coach Farren puts out a lot of content on [their topic]. If anything shifts or you want to chat more down the line, don't hesitate to reach out.\"\n\nDon't push. Don't follow up more than once in a week.\n\n## \"I just want to know more about the program\"\n\n> \"Best place to do that is on the call. It's 30 minutes, no obligation, and you'll walk out knowing exactly how everything works and whether it fits you. Want to grab a time?\"\n\n## \"Is this legit / are you a real coach?\"\n\n> \"Coach Farren runs Wesnoski Coaching. He's been in functional health for [X] years and specializes in complex cases (autoimmune, hormones, gut). The main site is www.wesnoskicoaching.com. The call walks through how it works.\"\n\n## Anything clinical you don't know the answer to\n\nTag Coach Farren in the team chat with a screenshot. When they reply:\n\n> \"I sent this over to Coach for some feedback and they said...\"\n\nNever guess. Never improvise.\n", "status": "live"}, {"id": "set-esc", "role": "Setter", "title": "Escalation to Closer", "content": "# Setter · Escalation to Closer\n\n## When the call is booked\n\nOnce the booking flow is complete (calendar appointment + email + phone in AR Funnel + discover page sent), AR Funnel automatically:\n\n- Adds the lead to the pipeline tracker\n- Triggers the calendar invite + Zoom link text\n- Updates the contact status\n\nSo most of the handoff is already done for you. The only manual piece left is letting the closer know.\n\n## What you still do manually\n\n### 1. Tag the closer in the team chat\n\nUse this template:\n\n> \"🔔 NEW BOOKED CALL — [Lead Name] · 1:1 Coaching\n>\n> 📅 [Day, Date, Time, Their Timezone]\n>\n> Notes:\n> - Goal: [their stated goal]\n> - Main challenge: [what they're dealing with]\n> - What they've tried: [their attempts so far]\n> - Flags: [anything the closer should know — overseas, on meds, complex case]\"\n\nThe closer should not have to re-discover the lead from scratch. Your handoff notes give them enough to walk in informed.\n\n### 2. Forward any pre-call DM activity\n\nIf the lead messages you between booking and the call (questions, reschedule requests, second thoughts), forward to the closer immediately. Do not try to handle it yourself.\n\n## What you don't need to do\n\nThe following are handled by AR Funnel automation. Do not manually do them unless something breaks:\n\n- Mark lead status (auto-updates on booking)\n- Add lead to tracker (auto-added through the AR Funnel call booking flow)\n- Send the Zoom link (auto-sent via SMS once phone is captured)\n- Send the calendar invite (auto-sent once email is captured)\n\nIf any of those automations fail, flag it in the team chat so we can fix the trigger.\n\n## If the lead cancels\n\nSend the lead one of these:\n\n> \"Totally understand. Do you mind if I ask, what changed your mind from when we spoke?\"\n\nOr:\n\n> \"Totally understand. Is there a day or time that would work better for your schedule?\"\n\nThen tag the closer in the team chat with the screenshot + lead name + what happened.\n\nIf they want to reschedule, run the reschedule process (one rescheduling policy maximum). Note in their AR Funnel contact that this is reschedule #1.\n\nIf they're out, move on. Don't chase.\n\n## After handoff\n\nSetter steps back. Don't message the lead again unless the closer asks you to. The closer owns the conversation from booking forward.\n", "status": "live"}, {"id": "set-rep", "role": "Setter", "title": "Reporting + KPIs", "content": "# Setter · Reporting + KPIs\n\n## End-of-day report\n\nSubmit at the end of every shift in the team chat. Template:\n\n```\nEOD Report — [Date]\n\n⏰ Hours worked:\n✅ Convos started:\n⚾️ Calls pitched:\n📞 Calls booked:\n📋 Follow-ups:\n\nHow would I rate my day? [1-10]\nAm I going to hit projections this week (7 calls booked)?\nHow do I know? If not, what do I need to hit projections?\nMy overall performance: X/10\n\n👀 Anything I need reviewed or passed to leadership:\n⁉️ Convos waiting to hear back from Coach:\n💫 IG handles for convos to be reviewed:\n```\n\n## Weekly projection\n\nDefault weekly target: **7 calls booked.**\n\nIf you're behind by Wednesday, flag in the team chat with: what's getting in the way + what you need to hit projections.\n\n## Trackers\n\nYou maintain two trackers:\n\n1. **Booking tracker** — every booked lead with full contact info, status, closer assignment, call date/time\n2. **DM tracker** — outbound + inbound counts, pitch rate, book rate, by day\n\nIf you don't know which tracker something goes in, ask in the team chat.\n\n## What gets tagged for review\n\nTag Coach Farren or leadership for:\n\n- Clinical questions you couldn't answer\n- Cases that feel complex (Lyme, mold, autoimmune flare, polypharmacy)\n- Edge-case objections you don't have a script for\n- Pricing questions that pushed back hard\n- Anything where you guessed and want a second opinion\n\nBetter to over-tag than to mislead a lead.\n\n## What gets tracked but not reported\n\nDon't put in EOD:\n- Casual convos that didn't pitch\n- Spam / bot replies\n- Repeat leads (same person from a previous booking)\n\nThese muddy the data.\n", "status": "live"}, {"id": "cls-role", "role": "Closer", "title": "Role Overview", "content": "# Closer · Role Overview\n\n## Title\n\nInternally: closer.\nExternally (in any client-facing copy or call intros): **Client Success Director.**\n\nWe never use \"closer\" or \"sales rep\" in front of a prospect.\n\n## What a closer does\n\nThe closer runs the discovery call. Specifically:\n\n1. Pre-call nurture (the 24h Loom + morning-of touch)\n2. Discovery (the 6-section deep dive into the lead's case)\n3. Pitch + program presentation (the MARCH Method, the tier that fits)\n4. Objection handling\n5. Close + payment link processing on the call\n6. Contract signature on the call\n7. Handoff to Coach Farren for onboarding\n\n## What a closer does NOT do\n\n- **Never close cold.** Discovery always comes first. No exceptions.\n- **Never send payment links off the call.** Always on the call.\n- **Never discount.** Our pricing is locked at discover.wesnoskicoaching.com. Split pay and month-to-month are allowed. Percentage discounts are not.\n- **Never offer custom pricing without Coach Farren Brown's pre-approval.**\n- **Never let a client off the call with neither a signed contract nor a verbal $500 deposit acknowledgment.** This is the legal protection layer. Don't skip it.\n- **Never give clinical advice on the call.** You're not the coach. You're the discovery and program presentation. Lab interpretation happens after they become a client, with Coach Farren.\n\n## What success looks like\n\nA successful close ends with:\n1. Payment processed via AR Funnel payment link\n2. Contract signed live on the call\n3. Membership Contract Sales filled in AR Funnel before the client ends the call\n4. Handoff to Coach Farren in the team chat\n5. Lead status updated in tracker\n\nIf any of those is missing, the close is incomplete. The chargeback risk is on you.\n\n## Mindset\n\n- **Discovery is everything.** A great discovery makes the close inevitable. A bad discovery makes the close a fight.\n- **Pressure kills sales.** Coach Farren's brand is conscious leadership. You invite, you don't command. You hold space, you don't push.\n- **The contract is the goal.** Not the payment. The contract. Get them to sign on the call.\n\n## Weekly target\n\nDefault: close rate of 30%+ on qualified leads booked through the setter.\n\nIf close rate is below 25%, we audit calls + adjust pre-call nurture.\n", "status": "live"}, {"id": "cls-prep", "role": "Closer", "title": "Pre-Call Prep", "content": "# Closer · Pre-Call Prep\n\n> The pre-call nurture is fully automated through AR Funnel. You don't send any of it manually. Your job before the call is to be prepared to run discovery the moment the lead joins the Zoom.\n\n## What AR Funnel handles automatically\n\nOnce the lead is booked, the following fire on their own:\n\n1. **Immediately after booking** — confirmation email with calendar invite + the discover.wesnoskicoaching.com pre-call page\n2. **24 hours before the call** — pre-call nurture sequence (Coach Farren's recorded video and educational anchor live inside the pre-call page itself)\n3. **Morning of the call** — reminder text with the Zoom link\n\nYou do not record any Looms. You do not write any nurture emails. You do not touch any of this. It's built in.\n\n## What you DO before every call\n\n### 1. Read the setter's handoff brief\nTagged in the team chat. Look for:\n- The lead's goal\n- Their main challenge\n- What they've tried before\n- Any flags (overseas, on meds, complex case, reschedule history)\n\nIf the brief is thin, ping the setter for more context before the call starts.\n\n### 2. Open AR Funnel on the lead's contact\n- Pull up the contact's profile\n- Have Contact Details open in the right-hand sidebar\n- Confirm time zone, email, phone are all populated\n- Have the Membership Contract Sales section ready to fill (you'll need it during the close)\n\n### 3. Open the Payment Links tab in a second browser window\nYou'll need this fast when the close happens. Open it before the call starts, not during.\n\n### 4. Open your Discovery Call Flow notes\n(See SOP 03)\n\n### 5. Spot-check the lead's IG / FB profile\n1 minute, no more. Look for case shape clues (autoimmune, perimenopause, gym background, weight-related, etc.). Don't go deep. You'll get more on the call. This is just so you walk in with context.\n\n## What you DON'T do before the call\n\n- Don't send the lead anything manually. AR Funnel has it.\n- Don't reach out to \"check in\" or \"warm them up.\" If the automation fired, that's enough. Bugging a lead pre-call increases ghost rates.\n- Don't try to run discovery over DM or email before the call.\n\n## If the automation fails\n\nIf you see a lead the day before their call and they haven't received the confirmation or pre-call page link, flag in the team chat. Don't try to manually patch it. We fix the automation trigger so it doesn't break next time.\n\n## Mindset\n\nYour prep work is to walk in ready to run discovery cold. Everything pre-call is automation. Show up sharp, on time, with your AR Funnel + payment link tabs open. That's the whole job.\n", "status": "live"}, {"id": "cls-flow", "role": "Closer", "title": "Discovery Call Flow", "content": "# Closer · Discovery Call Flow\n\n> Discovery is the most important part of the call. The bigger and clearer you make the gap between where they are and where they want to be, the more inevitable the close becomes. If you rush discovery, you'll fight every objection at the end.\n\n## Open the frame (the first 60 seconds)\n\nYou set the tone in the first minute.\n\n> \"Before we dive in, I want you to know this isn't a generic coaching program. Wesnoski Coaching is a biology-driven system. We rebuild metabolism, hormones, gut, and the nervous system phase by phase using the MARCH Method.\n>\n> I'm going to ask you some questions to understand where your system is breaking down. If it's a fit, we'll map out exactly how we'd fix it. Sounds good?\"\n\nWait for yes.\n\n## The six sections of discovery\n\n### Section 1 — Where are they now\n\nGet them to self-assess and verbalize dissatisfaction.\n\n- \"Walk me through what pushed you to book this call.\"\n- \"How do you feel about your energy, body composition, and overall health today?\"\n- \"If you had to rate your health right now on a scale of 1 to 10, where would you put yourself?\"\n- \"What's the biggest frustration you're dealing with right now?\"\n- \"How long has this been a frustration?\"\n\n**Pro tip:** Listen, don't move. Paraphrase back. \"So what I'm hearing is...\"\n\n### Section 2 — Where do they want to be\n\nPaint the vision. Tangible AND emotional.\n\n- \"If you could wave a magic wand and be where you want to be in the next 6 to 12 months, what would that look like — physically, mentally, emotionally?\"\n- \"How would you know if you 'made it' with your health? What's the marker of success for you?\"\n- \"On a scale of 1 to 10, 1 being 'this sounds cool to achieve' and 10 being 'I need this,' where do you rank it?\"\n- \"Where would your family rank this for you?\"\n\n### Section 3 — The Gap\n\nThis is where the close gets won or lost. Make the cost of inaction real.\n\n- \"Why is this important to you right now, as opposed to later?\"\n- \"What's at stake if nothing changes in the next 12 months?\"\n- \"How is this affecting other areas of your life — confidence, relationships, kids, work, social?\"\n- \"What would you be able to do once these changes are made that you can't now?\"\n- \"How would you feel then compared to now?\"\n\n### Section 4 — Why of the Why\n\nDig past the surface answer. Get to the emotional motivator.\n\n- \"When you think about achieving these goals, what would that actually mean for you personally?\"\n- \"What's the deeper reason behind wanting to make this change now? What's driving you?\"\n- \"How would you feel if you achieved everything you wanted, versus how you feel right now?\"\n- \"Would you settle for anything less than what you just described?\"\n\n### Section 5 — Obstacles + Past Attempts\n\nSurface the limiting beliefs and failed strategies. This gives you ammo for the close.\n\n- \"What have you tried before to fix this? What worked? What didn't?\"\n- \"What do you feel has held you back from getting where you want to be?\"\n- \"If nothing changes, do you believe the same obstacles will keep showing up?\"\n\nThis is also where you can drop a quick value bomb: \"The reason that didn't work is because [mechanism]. Most coaches miss this.\" But don't pitch yet.\n\n### Section 6 — Readiness + Commitment\n\nTransition from discovery into the pitch.\n\n- \"On a scale of 1 to 10, how ready are you to change this right now?\"\n   - If they say 10: \"Why is it a 10 for you?\" (Locks them in.)\n   - If anything but 10: \"What would need to happen to make it a 10?\"\n- \"If I could show you a system that directly addresses your goals and obstacles and could finally get you the results you want, would you be ready to commit today?\"\n\n## Pro tip for the whole flow\n\nDon't just ask questions. Listen deeply. Paraphrase. Expand on emotional cues.\n\n> Example: They say \"I just want to lose weight.\"\n> Bad: jump to next question.\n> Good: \"When you say lose weight, what does that actually mean for you? Is it about looking different, or feeling different? Both?\"\n\nYou are a detective in discovery. Find the real driver. Everything after depends on it.\n\n## Don't skip sections\n\nIf a section feels shallow, slow down and re-ask. The 6 sections aren't a checklist to rush through. They're the foundation for everything that follows.\n\nWhen discovery is complete, transition to pricing presentation (see SOP 04).\n", "status": "live"}, {"id": "cls-price", "role": "Closer", "title": "Pricing Presentation", "content": "# Closer · Pricing Presentation\n\n> The pitch comes after discovery is done. If you pitch before the gap is fully built, the close gets harder. Patience here.\n\n## The three questions before you pitch\n\nBefore you go into the program presentation, always ask these three:\n\n1. **\"Do you have any questions I haven't answered for you?\"**\n2. **\"Do you have any concerns with what we've gone through so far?\"**\n   - If yes, acknowledge and eliminate.\n   - Always re-ask after handling each concern: \"Anything else?\"\n3. **\"Do you feel this is the program for you and everything you need to finally [their Why of the Why]?\"**\n\nIf they're not at yes on all three, you're not ready to pitch. Go back to discovery and re-build the gap.\n\n## Map the path (the Authority Close)\n\nOnce they're ready, walk them through the MARCH Method as the personalized solution to what they just shared.\n\n**Template:**\n\n> \"From what you've told me, your system is stuck at [their current state from Section 1].\n> You're trying to get to [their vision from Section 2].\n> You've tried [A, B, C from Section 5].\n>\n> Here's how Coach Farren is going to fix it.\n>\n> Wesnoski Coaching is built on the MARCH Method. Five phases. We work them in order because the floor has to be stable before anything you layer on top will land.\n>\n> **M is Mitochondria.** The energy floor. We rebuild this first because if your cells can't make power, nothing else has fuel.\n>\n> **A is Absorption and Detox.** Your gut, liver, and bile. We fix absorption next because you can't supplement your way past poor absorption.\n>\n> **R is Resilience.** Your nervous system, cortisol, inflammation. Most people we work with have lived in survival mode for years.\n>\n> **C is Cycle and Signal.** Hormones, thyroid, fertility. This is where most other coaches try to start. We start here only once the floor is stable.\n>\n> **H is Healthspan and Strength.** Body comp, lean tissue, longevity. This is the result, not the goal.\n>\n> For your case specifically, we'd start at [the phase that matches their case]. We move you forward one phase at a time so you can actually see the wins. And once you're in, you're in our community of men and women doing the same work.\"\n\nPause. Let it land.\n\n## The light close\n\nPro tip from Coach Farren: make it light before you say the number.\n\n> \"Look, this isn't a transformation pitch. This is a real rebuild. The work is slow, it's the long road, not the quick fix. But for people who want the actual rebuild and not another shiny protocol, this is what works.\"\n\n## Then the number\n\nPull pricing directly from discover.wesnoskicoaching.com. Don't improvise.\n\n**Precision Engineering:** $1,400 PIF / $1,600 plan (3-month)\n**System Dominance:** $2,400 PIF / $2,700 plan (3-month, extendable)\n\n> \"Based on what you shared, I'd recommend [tier]. That's [PIF price] paid in full, or [plan price] across a payment plan. Both options are at discover.wesnoskicoaching.com if you want to see them written out.\n>\n> Which one feels right for you?\"\n\n## No discounts\n\nWe don't discount. Our pricing is locked. What we CAN offer:\n\n- Split pay (already in the plan price)\n- Month-to-month structure\n\nWhat we DON'T offer:\n\n- Percentage discounts\n- \"On-the-call specials\"\n- Promo codes\n\nIf they push for a discount, redirect to the value:\n\n> \"The price is the price because of the depth of what's included. Lab analysis, direct chat with Coach Farren, the protocol layer, the community. We don't discount it because we don't water it down. What I can do is structure the payment to make it work for you.\"\n\n## After the pitch\n\nMove to objection handling SOP (05) if they raise anything. If they're a yes, move straight to payment link processing SOP (09).\n", "status": "live"}, {"id": "cls-obj", "role": "Closer", "title": "Objection Handling", "content": "# Closer · Objection Handling\n\n> Objections are not rejection. They are unanswered questions. If your discovery was solid, you already have the ammo to handle every one.\n\n## The five objections you'll hear\n\n1. \"I need to think about it\"\n2. \"I have to talk to my spouse\"\n3. \"I can't afford it\"\n4. \"It's not the right time\"\n5. \"I'm looking at other coaches\"\n\nBelow: the framework for each.\n\n## 1. \"I need to think about it\"\n\n> \"I get that. This is a big decision and you should take it seriously. Can I ask you something though. Usually when someone says they need to think about it, it's one of four things. Let's find which one it is.\"\n\nThe four:\n\n### A. They don't believe the program can get them to their why\n\n> \"Do you feel this program can get you to [their Why of the Why]?\"\n\nIf no: go back to whatever part of the presentation they felt was missing and re-walk it.\n\n### B. They don't believe in their own follow-through\n\n> \"Do you believe in yourself to follow through on this?\"\n\nIf no: usually it's a time concern. Handle:\n\n> \"Talk to me about what time looks like for you week to week. Most clients walk in thinking they don't have time and walk out realizing they've been spending hours on protocols that don't work. The MARCH Method is structured around real lives, not perfect schedules.\"\n\n### C. They don't believe they can be successful (fear, imposter, doubt)\n\n> \"Do you believe you can be successful with this?\"\n\nIf no: 99% of the time it's fear. Don't reach for high-pressure framing. Hold the moment.\n\n> \"I hear you. The doubt makes sense. Most of the people Coach Farren works with came in with the same doubt. That's why the community matters. You're not doing this alone, and you're not the first person to feel exactly what you're feeling right now.\"\n\nThen: \"Are you going to let that doubt make this decision for you, or are you going to make it from the version of you that already decided you're worth this?\"\n\n### D. They can't afford it\n\n> \"If it's just the financing piece, are you open to getting resourceful to come up with something that works for both of us?\"\n\nIf yes: walk them through the payment plan option. Don't discount the program. Restructure the payment.\n\nIf no: this is a no, not a \"think about it.\" Move on warmly. \"Totally understand. The work I do is the right work, but the timing has to be right for you. When it is, we'll be here.\"\n\n## 2. \"I have to talk to my spouse\"\n\n> \"Totally get it. Tell me about their involvement in this process. What kind of conversations have you had with them?\"\n\nBranch:\n\n### If they say NONE\n> \"Why haven't you gotten them involved before now?\"\n\nThis usually reveals whether the spouse is a real decision-maker or being used as a shield.\n\n### If they say YES, run through these:\n- \"Have you had any conversations about what your ideal scenario looks like?\"\n- \"Have you talked about where you're at currently, the struggles you're facing, and how you feel?\"\n- \"How much have you talked about working with a coach to get to where you want to go?\"\n- \"Do you believe you can be successful working with us and finally feel better?\"\n- \"Does your spouse trust your judgment?\"\n- \"If you achieved everything you described in the next 6 to 12 months, would your spouse be upset with you for committing today?\"\n\n### If they say no, spouse wouldn't be upset → close\n> \"Then let's lock you in.\"\n\n### If they still need to speak with them\n> \"Are they home by chance? Here's what I do all the time. Turn the camera off, put me on mute, go chat with them. I'll work on something while you're gone. When you come back, I'm here to answer any of their questions and we'll go from there. Sound fair?\"\n\nIf they can't pull the spouse in: rebook the call with both spouses present. Don't let it go cold.\n\n## 3. \"I can't afford it\"\n\nThis is the same framework as \"I need to think about it.\" Walk through the four beliefs.\n\nWhen you get to belief #4 (can't afford it):\n\n> \"If it's just financing, are you open to getting resourceful to come up with something that works for both of us?\"\n\nPitch the payment plan. Don't discount.\n\nIf they truly cannot afford it, this is not a close. Move on warmly. The work has to actually be possible for them.\n\n## 4. \"It's not the right time\"\n\n> \"I hear that. Can I ask, what would make it the right time?\"\n\nListen for the real concern underneath. It's usually:\n- A financial event (waiting on a paycheck, year-end bonus, tax return)\n- A schedule event (waiting for a quieter season, after a kid's surgery, etc.)\n- Avoidance disguised as timing\n\nIf financial: same as \"can't afford it.\" Walk the four beliefs.\n\nIf schedule: walk through what week-to-week actually looks like. Show that the program is structured around real life, not perfect conditions.\n\nIf avoidance: re-anchor to the cost of inaction.\n\n> \"Be honest with yourself for a second. If we're back on a call in 6 months, what would have had to be different in your life for you to say yes then versus now?\"\n\n## 5. \"I'm looking at other coaches\"\n\n**Acknowledge and reframe:**\n\n> \"Totally makes sense. You should look at other programs. If you weren't, I'd think you weren't serious about your health. The truth is, not all coaches are the same.\"\n\n**Clarify the comparison:**\n\n> \"Just so I understand, what are you hoping those other programs will give you that you're not sure you'll find here?\"\n\n**Create urgency and confidence:**\n\n> \"I'll be blunt. If you want to shop around for a better price, you'll find it. If you want to shop around for the level of depth and proof we operate at, you won't. That's why people who compare end up circling back here. But by then, they've lost 6 months of progress.\"\n\n**Close with control:**\n\n> \"So here's my advice. If you feel another program is going to give you more accountability and better results than Coach Farren can, you should go with them. But if deep down you're ready to stop looking and actually achieve the results you want, let's lock you in and get moving.\"\n\n## Universal closing principle\n\nAfter handling every objection, re-ask:\n\n> \"Anything else on your mind?\"\n\nIf no: go for the close.\nIf yes: handle it. Then re-ask.\n\nYou never go for the close while there's still a live objection on the table.\n\n## What NEVER to do\n\n- Don't guarantee results or money back. We don't do guarantees.\n- Don't discount.\n- Don't pressure with \"rocking chair\" or \"fork in the road\" theater. That language doesn't fit our brand voice.\n- Don't tell them this is their last chance, special pricing, on-the-call-only, etc. That's not who we are.\n- Don't get aggressive. Conscious leadership tone. Invite, don't command.\n\nIf a no is really a no, accept it warmly. The work has to be the right call for them, or it won't work anyway.\n", "status": "live"}, {"id": "cls-close", "role": "Closer", "title": "Closing Techniques", "content": "# Closer · Closing Techniques\n\n> The close isn't a moment. It's the natural end of a discovery that built the gap correctly. If discovery was solid and objections are handled, the close is just confirming the next step.\n\n## The transition into the close\n\nAfter objections are handled and they say \"anything else? no\" — you move into the close.\n\n> \"Sounds like this is the right fit. Let's get you locked in.\"\n\nOr:\n\n> \"Based on everything we've talked about, this is exactly what you need. Let's get you started.\"\n\nDon't ask \"do you want to do this?\" That's a yes/no question that invites delay. Assume the close.\n\n## The Authority Close (light version for the moment of decision)\n\nIf you need to re-anchor before locking them in:\n\n> \"Look. Your system is stuck at [their state]. You want to get to [their vision]. You've tried [what they tried]. We're going to rebuild this in phases using the MARCH Method, starting with [the phase that fits their case].\n>\n> Coach Farren will be with you the whole way. Direct chat in the app, full lab analysis, the community walking through it with you.\n>\n> Are you ready to commit today?\"\n\nWait for yes.\n\n## Confirm the tier\n\n> \"I'd recommend [Precision Engineering / System Dominance] based on what you shared. The PIF is [price], the plan is [price]. Which one works better for you?\"\n\nIf they pick PIF: move to payment link processing immediately.\nIf they pick plan: confirm the payment cadence (50/50 split), move to payment link.\nIf they hesitate: re-ask \"what's holding you back?\" and handle as objection.\n\n## The micro-close before the payment link\n\n> \"Perfect. I'm going to send you the payment link right now. Once that processes, the contract will hit your inbox. I want to walk through it with you on this call, get your signature, and have you officially set up before we wrap. Sound good?\"\n\nThis pre-frames the next 10 minutes. They're not surprised when the contract appears. They expect to sign on the call.\n\n## Going for the close\n\nOnce they confirm tier:\n\n1. Move to Payment Link Processing SOP (09). Verify link in browser, send.\n2. While they pay, set up Membership Contract Sales in AR Funnel.\n3. Watch them sign the contract live.\n4. Confirm onboarding handoff.\n\n## If they say yes but want to pay later\n\n> \"I hear that. The thing is, the deal isn't locked until payment goes through. What I can do is structure the plan so the first payment is whatever works for you today. Let's get the first piece in and lock the spot.\"\n\nIf they refuse: this is actually an unhandled objection. Go back to handle.\n\n## If they say yes but want to sign the contract later\n\nThis is the gray zone. Per house doctrine: contract gets signed ON the call. No exceptions.\n\nIf they push back, run the verbal $500 deposit disclosure per the Payment Link Processing SOP. That's the fallback financial protection.\n\nBut the goal is always: signed contract on the call. Press for that first.\n\n## Mindset for the close\n\n- **No fear.** If discovery was solid, the close is earned.\n- **No pressure.** Invite, don't command. Conscious leadership.\n- **No theater.** No \"fork in the road,\" no \"rocking chair,\" no \"this is your last chance.\" That's not us.\n- **Hold space.** They're committing to a real rebuild. Honor that.\n- **Move with confidence.** Hesitation in your voice reads as doubt in the offer. Speak like the close is already done, because it should be.\n\n## What \"no\" actually means\n\nSometimes people will hold a no past every objection. That's okay.\n\nWhen you can tell it's a real no, end the call warmly:\n\n> \"I hear you. The work I do is the right work, but the timing has to be right for you. When it is, we'll be here. In the meantime, [name of relevant resource], and stay connected.\"\n\nDon't burn the lead. Some of our best closes come 3 to 6 months after the first call.\n", "status": "live"}, {"id": "cls-follow", "role": "Closer", "title": "Post-Call Follow-Up", "content": "# Closer · Post-Call Follow-Up\n\n> AR Funnel handles the post-call automation. Your job after the close ends at the handoff.\n\n## What AR Funnel does automatically\n\n### If the close happened\n\nThe moment Membership Contract Sales is saved in AR Funnel:\n\n1. **Intake form** auto-sends to the client's email\n2. **Welcome sequence** triggers (app onboarding email, community access invite)\n3. **Coach Farren** gets notified the client is officially in\n\nYou don't send any of these. They're built in.\n\n### Once the client submits the intake form\n\nCoach Farren picks it up and starts building the plan. That's his lane.\n\n## What you DO after every call\n\n### Branch 1 — They closed on the call\n\n1. **Verify payment processed** in AR Funnel\n2. **Verify contract is signed** (signature timestamp visible)\n3. **Verify Membership Contract Sales is filled and saved** (this is the trigger for everything else)\n4. **Tag Coach Farren in the team chat** with the handoff brief (see Handoff to Coaching SOP)\n5. **Step back.** The relationship is now Coach Farren's.\n\n### Branch 2 — Follow-up call booked\n\nThey wanted to think, talk to a spouse, or pull labs together, and you booked a second call:\n\n1. Confirm the second booking in AR Funnel\n2. AR Funnel re-triggers the pre-call nurture sequence for the second call\n3. Note in their AR Funnel contact: outcome of the first call, what objection is open, what to address on the second call\n4. Tag the closer (if not you) for the second call in the team chat\n\n### Branch 3 — Not closed, no follow-up\n\n1. Update lead status to Not Closed in AR Funnel\n2. Note in their contact: main objection, whether they want a check-in in 3 to 6 months, anything Coach Farren should know if they reach back out\n3. AR Funnel's re-engagement automation handles future warm touches\n4. Step back\n\n## What you DON'T do post-call\n\n- **Never send a payment link off the call.** If they want to commit later, they book another call.\n- **Never discount post-call.** \"Hey I can take 10% off if you commit tonight\" is not our brand.\n- **Never chase.** AR Funnel handles re-engagement on a calibrated schedule.\n- **Never argue with a no.** Honor it. Move on.\n\n## Final note\n\nMost of the post-call lift is automated by design. Your job is to make sure the AR Funnel data is clean (payment processed, contract signed, Membership Contract Sales saved) so the automation fires correctly. If the data is dirty, the automation breaks, and the client doesn't get the intake form. Then we're scrambling.\n\nClean data in. Clean automation out. That's the whole job after the close.\n", "status": "live"}, {"id": "cls-hand", "role": "Closer", "title": "Handoff to Coaching", "content": "# Closer · Handoff to Coaching\n\n> Once the close is done, the closer steps back and Coach Farren takes over. This SOP makes sure nothing gets dropped in that transition.\n\n## The handoff window\n\nThe handoff happens immediately after the close. Not the next day. Not after the closer's shift ends. Immediately.\n\n## Step-by-step\n\n### 1. Confirm AR Funnel is fully set up\n\nBefore you message Coach Farren:\n\n- Payment processed and visible in AR Funnel\n- Contract signed and signature timestamp visible\n- Membership Contract Sales filled in (payment amount, payment type, program length, start date, program tier)\n- Lead status updated to Client in tracker\n\nIf any of these is missing, do NOT hand off yet. Fix it first.\n\n### 2. Tag Coach Farren in the team chat\n\nUse this template:\n\n```\n✅ NEW CLIENT — [Client Name]\n\nTier: [Precision Engineering / System Dominance]\nPayment: [PIF / Plan, first payment processed]\nStart date: [date]\n\nCase summary:\n- Main goal: [their stated goal]\n- Current state: [where they're stuck — their words]\n- Main case shape: [autoimmune / hormones / gut / thyroid / etc]\n- Major challenges: [what they've been struggling with]\n- What they've tried: [list]\n- Lab status: [recent labs in hand / need to be ordered]\n- Flags: [meds they're on, complex case notes, anything Coach Farren needs to know]\n\nTheir Why of the Why: [the emotional anchor from discovery]\n\nAnything else: [reschedule history, spouse involvement, complications]\n```\n\n### 3. Send the welcome message to the client\n\nTemplate (final version to be approved by Coach Farren):\n\n> \"[Name], welcome to Wesnoski Coaching. Coach Farren will reach out within 24 hours to start your onboarding. He'll get your intake started, set up your lab orders if we need to, and book your first deep-dive call.\n>\n> In the meantime, the app link is [link]. Get logged in when you can.\n>\n> Excited for what's ahead. See you soon.\"\n\n### 4. Move the lead in the tracker\n\n- Status: Client\n- Closer: [your name]\n- Close date\n- Tier\n- Start date\n- Linked AR Funnel contact ID\n\n### 5. Step back\n\nThe relationship is now Coach Farren's. The closer does not message the client again unless:\n- Coach Farren explicitly tags you for context\n- The client reaches out about something only the closer would know (payment issue, contract question)\n\nFor anything clinical, schedule, or coaching-related, redirect:\n\n> \"Great question. Coach Farren is going to handle that with you directly during onboarding. He'll reach out within 24 hours.\"\n\n## What gets dropped if you skip this\n\nWithout the proper handoff, Coach Farren walks into the onboarding call cold. He has to ask the client to re-tell their case from scratch. That's a bad first impression and a waste of the client's time.\n\nYour job isn't done at \"they paid.\" Your job is done when Coach Farren has a complete brief and the client has been welcomed.\n\n## Special cases\n\n### Client paid but contract not signed\nThis shouldn't happen. If it does, this is a high-risk close. Tag Coach Farren immediately and flag for follow-up to chase the signature within 24 hours. Refund risk goes up significantly.\n\n### Client wants a later start date (more than 2 weeks out)\nMake sure the $500 non-refundable deposit verbal disclosure happened on the call (per Payment Link Processing SOP). Log the acknowledgment in AR Funnel contact notes.\n\n### Client has complex medical case\nFlag clearly in the handoff. Coach Farren may want to do a pre-onboarding call to assess scope before formal onboarding begins.\n\n### International client\nFlag time zone in the handoff. Coach Farren will adjust onboarding scheduling.\n\n## Final note\n\nThis handoff is the start of the client experience. If it's clean, the client feels held. If it's sloppy, the client feels lost. The 10 minutes you spend on this handoff is the highest-leverage 10 minutes in the entire close.\n", "status": "live"}, {"id": "cls-pay", "role": "Closer", "title": "Payment Link Processing", "content": "# Closer · Payment Link Processing\n\nThis SOP covers everything from sending the payment link on the call through getting the contract signed before the client leaves the call.\n\n## Hard rules\n\n**Payment links are sent on the call. Never off the call.**\n\nIf a client wants to think about it, you rebook them. You do not send a payment link to \"follow up later.\" That kills the close and creates refund risk. If they want time, you give them time on the calendar, not in their inbox.\n\n**The contract gets signed ON the call.**\n\nNot after. Not in the email. On the call, while the client is still on Zoom with you. You watch them sign live. The signed contract is what gives Wesnoski Coaching the legal position to deny refunds. Without it, we are exposed. With it, we are protected.\n\nThis is the primary goal of the back half of every close. Signature on the call.\n\n## Step-by-step\n\n### Send the payment link\n\n1. **Open AR Funnel Payment Links.** [https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/v2/paymentlinks](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/v2/paymentlinks)\n\n2. **Find the link for the tier you closed at.** Standing link for standard pricing. Custom-built link for negotiated pricing (pre-approved by Coach Farren Brown).\n\n3. **Copy the link.**\n\n4. **Verify the link before sending.** Paste it in a fresh browser tab. Confirm the price, tier, and PIF vs payment plan match what you sold. Five seconds. Saves a refund.\n\n5. **Send the link to the client on the call.** Drop it in the Zoom chat or text it during the live call.\n\n### Set up the contract while the client is paying\n\nWhile the client is on the payment screen, you start building their contract in AR Funnel. This happens in parallel so the contract lands the second they finish payment.\n\n6. **Open the Messages tab in AR Funnel.** Click on the contact you are speaking with. You can also find the contact through the Calendar section if it's easier (their appointment will pull up their contact).\n\n7. **Open the contact's right-hand sidebar: Contact Details.**\n\n8. **Go to Membership Contract Sales.** Fill in:\n    - Payment amount\n    - Payment type (PIF vs plan)\n    - Program length (3-month, 6-month, etc.)\n    - Program start date\n    - Program tier (Precision Engineering or System Dominance)\n\n9. **Save.** This has to be done while the client is still on the payment screen. The contract gets generated and sent to the client immediately on save.\n\n### Get the contract signed on the call\n\n10. **Confirm the client received the contract.** Walk them through opening it. Stay on the call.\n\n11. **Watch them sign.** Get visual confirmation in AR Funnel that the signature is recorded before you end the call.\n\n## If the client will not sign on the call\n\nIf they want time to read it, want to check with a partner, want to \"think about it\" — you do not just let them go. The fallback is verbal disclosure of the $500 non-refundable deposit, said clearly before they end the call.\n\nUse this exact phrasing:\n\n> \"Heads up, the $500 deposit on what you just paid is non-refundable. That is your commitment to the start date with Coach Farren. The rest of the payment can be discussed if you change your mind, but the $500 holds the slot. I want to make sure that is clear before we wrap.\"\n\nWait for verbal acknowledgment. \"Yes, understood\" or equivalent.\n\nAfter the call, note in the AR Funnel contact notes that the verbal disclosure was made, who acknowledged it, and the time.\n\nThis verbal disclosure is the financial protection layer when the contract layer is missing. Do not skip it. If you let them off the call with neither a signed contract nor a verbal acknowledgment of the deposit rule, we are exposed.\n\n## PIF + start date more than 2 weeks out\n\nIf the client is paying in full upfront AND wants a start date more than 2 weeks out, you make the same verbal disclosure regardless of whether the contract was signed. Belt and suspenders.\n\n> \"Because your start date is more than two weeks out, the $500 deposit on this is non-refundable. The rest refunds if you change your mind before we begin, but the $500 holds the slot.\"\n\nVerbal acknowledgment. Note in contact notes.\n\n## Watch-outs\n\n- Verify every payment link in a fresh browser before sending. Wrong tier or wrong PIF/plan format kills the close.\n- The \"Membership Contract Sales\" section is the contract trigger. If you skip it, no contract gets sent. The payment processes but you have no signed agreement. Bad outcome.\n- If you let the client off the call without either a signed contract or the verbal $500 deposit acknowledgment, the refund and chargeback risk is on you. There is no in-between.\n- No exceptions on the deposit rule without Coach Farren Brown's sign-off. If you make an exception, you own the refund.\n\n## Resources\n\n- [AR Funnel Payment Links](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/v2/paymentlinks)\n- See also: Closer · Payment Link Setup (for the build process if a custom link is needed)\n", "status": "live"}, {"id": "cls-pay-setup", "role": "Closer", "title": "Payment Link Setup", "content": "# Closer · Payment Link Setup\n\nWhen a client signs at the standard tier price, use the existing payment link from Resources. When a client signs at a custom price (negotiated, deposit-first, or any non-standard configuration), you build a new payment link in AR Funnel. This SOP walks you through it.\n\n## Before you do anything\n\n**Get the price approved by Coach Farren Brown.**\n\nNo payment link gets built without his sign-off. Drop the proposed price + the client name in DM. Wait for \"approved.\" Then proceed.\n\nThis is non-negotiable. We do not run payment links on guessed pricing. If you build one without approval and the price is wrong, we have to refund and rebuild. Don't.\n\n## Step-by-step\n\n1. **Get pricing approval** from Coach Farren Brown. Hold here until you have it in writing.\n\n2. **Open AR Funnel Products.** [https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/products](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/products)\n\n3. **Click into the One-on-One Coaching product.**\n\n4. **Open the Pricing menu in the left sidebar.** Scroll all the way to the bottom and click **Add another price**.\n\n5. **Enter the approved price. Save it.**\n\n6. **Open AR Funnel Payment Links.** [https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/v2/paymentlinks](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/v2/paymentlinks)\n\n7. **Click \"Create a new payment link.\"** Select the product you just added the price to.\n\n8. **Turn on both required fields:**\n    - Require phone number\n    - Collect customer address\n\n   Both are required, not optional. Phone for follow-up. Address for shipping any physical assets (brochures, supplements if relevant, lab kits).\n\n9. **Save the link.** Test that it loads. Copy the URL. Send it to the client.\n\n## Watch-outs\n\n- Skipping the approval step is the fastest way to a refund chargeback. Always wait for the green light from Coach Farren Brown.\n- If you forget to turn on phone + address, you will be chasing the client for that info later. Easier to capture it upfront.\n- Confirm the link matches what you sold (one-time pay-in-full vs payment plan). The format is set on the pricing side, not the link side, so check the pricing setup before you generate the link.\n- Every new payment link gets logged in the Payment Links resource doc so we have a running list. Drop the link + client name + price + date in there after you send it.\n\n## Resources\n\n- [AR Funnel Products](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/products)\n- [AR Funnel Payment Links](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/v2/paymentlinks)\n", "status": "live"}, {"id": "res-links", "role": "Resources", "title": "Application + Booking Links", "content": "# Application + Booking + Resource Links\n\n## Core URLs\n\n| Purpose | URL | Who uses it |\n|---|---|---|\n| Application form | https://info.wesnoskicoaching.com/application | Setters share with qualified leads. Closers reference on calls. |\n| Pre-call page | https://discover.wesnoskicoaching.com | Auto-sent to every booked lead by AR Funnel. Setters also send it manually after booking (per Booking Flow SOP). |\n| Main site | https://www.wesnoskicoaching.com | Public marketing. Reference only. |\n| Foundations Resource Library | https://resource.wesnoskicoaching.com | Free education site. Setters send to research-mode leads. |\n| Coach Farren's link tree | https://wesnoskicoaching.github.io/links/ | Use for research-mode leads, content references, social sharing. |\n\n## Free Resource Library\n\n### Foundations · resource.wesnoskicoaching.com\n\nURL: https://resource.wesnoskicoaching.com\n\nThe Foundations Resource Library is Coach Farren's free public education site. It covers the MARCH method, energy and fatigue, weight and metabolism, gut and digestion, hormones and mood, and includes anonymized real case studies. The site also includes three quizzes: a Phase Quiz that identifies which phase of MARCH a lead is most likely in, a Knowledge Check that tests their grasp of the framework, and a Coaching Fit Check that self-qualifies them for 1:1.\n\nEvery doc closes with a soft CTA to apply for 1:1 coaching. The Fit Quiz specifically routes \"Strong Fit\" leads straight to the application URL.\n\n**Who you send here:**\n- Leads in research mode who said no to a call but want education\n- Followers asking general questions about labs, hormones, mechanism, or symptoms\n- Anyone curious about how Coach Farren thinks but not ready to sign\n- Leads who need to build framework literacy before a discovery call lands well\n\n**Who you don't send here:**\n- Hot leads ready to book a call (they go to the application instead)\n- Existing 1:1 clients (they already have everything in this and more)\n\n**Setter script for redirecting research-mode leads:**\n\n> \"If you're in research mode right now, the best place to start is Coach Farren's free resource library at resource.wesnoskicoaching.com. He breaks down the MARCH method, why your labs look normal but you feel off, and walks through real case studies. There's also a quiz that tells you which phase your case likely lives in. Free, no signup required.\"\n\n**Bonus play for a follow-up:**\n\nTwo or three days after sending the link, follow up with: \"Did you take the Phase Quiz on the resource library? Curious which phase came up for you.\" That re-engagement opens a new conversation and frequently surfaces the discovery call.\n\n## How to share\n\n- **Setter → lead:** drop the application URL only after qualification criteria are met (see Setter Lead Qualification SOP)\n- **Setter → research-mode lead:** drop the Foundations Resource Library link as a warm exit\n- **Closer → prospect on call:** never share pricing links cold. Pricing lives behind the discovery call.\n\n## Coach Farren's public link tree\n\n[https://wesnoskicoaching.github.io/links/](https://wesnoskicoaching.github.io/links/)\n\nThis is the master public hub for all of Coach Farren's pages: main site, social media (IG, TikTok, X, YouTube, Facebook), LinkedIn, application, pre-call page, and Foundations Resource Library.\n\nUse it as a single share-link when:\n- A lead asks where to find Coach Farren online\n- You want to send someone all his public touchpoints in one drop\n- You're posting in a bio or external profile and only have room for one URL\n\nDo NOT send this to a lead in active booking flow. Send the application URL or the pre-call page URL directly. The link tree is for navigation, not conversion.\n\n", "status": "live"}, {"id": "res-pay", "role": "Resources", "title": "Payment Links", "content": "# Payment Links\n\n> Source of truth on what we charge. Pulled from pricing locked at discover.wesnoskicoaching.com. Any deviation requires Coach Farren Brown's approval before a link gets built.\n\n## AR Funnel access\n\n- [Products page](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/products) — where prices live, attached to the One-on-One Coaching product\n- [Payment Links page](https://app.arfunnel.io/v2/location/HLXbJNLFCt1e6vHMIT61/payments/v2/paymentlinks) — where you generate the link to send to the client\n\n## How to build a new payment link\n\nSee **Closer · Payment Link Setup** for the step-by-step. Short version: approval first, then product, then price, then link, with phone + address required on the link.\n\n## Standing payment links\n\n| Tier | Pay In Full | Payment Plan | Notes |\n|---|---|---|---|\n| Precision Engineering | TBD | TBD | TBD |\n| System Dominance | TBD | TBD | TBD |\n\n## Custom payment links log\n\nDrop every custom-built link here after you send it. Running log for accounting + reconciliation.\n\n| Date | Client | Price | Link | Approved by |\n|---|---|---|---|---|\n| | | | | |\n", "status": "live"}, {"id": "res-march", "role": "Resources", "title": "MARCH Method Primer", "content": "# The MARCH Method · One-Page Primer\n\nClosers and setters need to be able to walk a prospect through the framework in 60 seconds. Memorize this.\n\n## Five phases. In this order.\n\n- **M is Mitochondria.** The energy floor underneath every cell. If the cells can't make power, nothing layered on top has fuel to work.\n- **A is Absorption and Detox.** Gut, liver, bile flow. You can't supplement your way out of poor absorption.\n- **R is Resilience.** Nervous system, cortisol, inflammation. Most clients have lived in survival mode for years.\n- **C is Cycle and Signal.** Hormones, thyroid, fertility. Where most other coaching tries to start. We start here only once the foundation underneath is stable.\n- **H is Healthspan and Strength.** Body composition, lean tissue, energy, longevity. The result of the system working, not the goal.\n\n## Why we sequence\n\nMost prospects have already cycled through coaches throwing the kitchen sink at them. Supplements, training, hormones, peptides all stacked. Almost none of it landed because the foundation was broken. We work one phase at a time so the wins are visible and the trust builds.\n\n## What you say on call\n\n\"Most of the men and women Farren works with arrive somewhere similar. Tired in a way sleep doesn't fix. Body that doesn't feel like theirs. Told by more than one doctor that everything looks normal while everything feels off. The MARCH Method is the way Farren rebuilds the system underneath that gap, in the order biology demands.\"\n", "status": "live"}, {"id": "res-tiers", "role": "Resources", "title": "Coaching Tiers", "content": "# Coaching Tiers\n\n> Source of truth on pricing: discover.wesnoskicoaching.com. Always pull from there.\n\n## What's different between tiers\n\n**The only thing that changes between tiers is cadence.** How often you get live, direct touchpoints with Coach Farren.\n\nEverything else is the same:\n- Same depth of lab analysis\n- Same protocols\n- Same app, same community, same education library\n- Same direct chat access to Coach Farren\n- Same nutrition, training, supplementation, peptide, and lifestyle coverage\n\nHigher tier = more frequent live calls and more 1-on-1 time. Lower tier = same access, longer cadence between live calls.\n\n## Tiers\n\n### Precision Engineering\n- 3-month engagement\n- $1,400 pay in full / $1,600 payment plan (50/50 split)\n- Bi-weekly app-based check-ins with Coach Farren\n- Direct chat access between check-ins\n- Full library access\n\n### System Dominance\n- 3-month engagement (extendable)\n- $2,400 pay in full / $2,700 payment plan (50/50 split)\n- Weekly live touchpoints with Coach Farren\n- Monthly deep-dive call\n- Direct chat access between check-ins\n- Full library access\n\n## Fit\n\nIf they're on the call, they're a fit. The setter qualified them, the booking happened, that's good enough.\n\nException: extreme emotional instability that prevents normal coaching conversations. That's not a coaching problem, that's mental health care. Defer to physician.\n\n## Discounts\n\nWe don't discount. Our pricing is locked at discover.wesnoskicoaching.com.\n\nWhat we CAN offer:\n- Split pay (already built into the plan pricing)\n- Month-to-month payment plan\n\nWhat we DON'T offer:\n- Percentage discounts\n- \"On-the-call\" specials\n- Promo codes\n- Holiday pricing\n", "status": "live"}, {"id": "res-faq", "role": "Resources", "title": "FAQ for Leads", "content": "# Common Lead Questions + Approved Answers\n\n> Calibrated to Coach Farren's voice. Use these as your default. If a lead asks something not covered, tag Coach Farren and we add the answer here so nobody has to ask again.\n\n## \"What makes Wesnoski different from a naturopath or functional MD?\"\n\nTwo things separate us from anything else in this space.\n\nFirst, the ongoing support and care. Someone is always in your corner, walking through the rebuild with you. Real people. Direct access to Coach Farren in the app. We don't hand you a stack of protocols and wave goodbye. We stay in the work with you.\n\nSecond, the depth of the lab analysis. Clients tell us all the time they've never had their labs reviewed in this much detail. They've never understood their own body this clearly before. The
