 lab review you get from us is the highest-quality deliverable in this space, full stop. That's the difference.\n\n## \"How long until I see results?\"\n\nMost people see real shifts in the first 7 to 14 days. How fast that lands depends on two things: how closely you follow the protocol, and how much you communicate with us. The more communication, the better. We adjust in real time.\n\n## \"Do I need lab work before signing up?\"\n\nGreat if you have recent lab work, especially anything within the past 3 months. If not, no problem. We order labs in-house. Direct lab testing, any blood test or advanced lab ordered straight to you. Cost varies by panel.\n\n## \"Is this just supplements, or do you cover training and nutrition too?\"\n\nWe cover everything. Nutrition guidance and full cookbooks built around your phase. Programmed training tailored to where you are. Supplementation across every layer (over-the-counter, peptides, partnerships with HRT clinics where indicated). Lifestyle and nervous system protocols. The whole system.\n\n## \"Can I do this if I'm on TRT, HRT, NDT, GLP-1, or SSRI?\"\n\nYes. We work with clients on all of these.\n\nOur coaching layer (nutrition, lifestyle, lab interpretation, supplementation, and where applicable peptides) runs alongside whatever your prescriber has you on. We don't titrate prescriptions. We surface markers and questions for your physician. We collaborate, not replace.\n\n## \"Do you work with men or just women?\"\n\nBoth. Coach Farren works with men and women. The cases we see most often (hormones, gut, thyroid, autoimmune, metabolic) show up across the board.\n\n## \"What if I have a complicated case (lupus, MS, Lyme, etc.)?\"\n\nComplex cases are where we live. Autoimmune (Hashimoto's, Graves, lupus, RA, MS, AS, Sjogren's, IBD, T1D). Mold and CIRS. Lyme and co-infections. Perimenopause with Hashi overlap. Post-COVID. Chronic fatigue. Coach Farren built his entire framework around these cases.\n\nWe're not the right call for someone wanting to lose 10 pounds before a wedding. We're the right call when you've been through every other lane and still don't have answers.\n", "status": "live"}, {"id": "res-farren", "role": "Resources", "title": "About Coach Farren", "content": "# About Coach Farren Brown\n\n> Use this when leads ask about Coach Farren, his qualifications, his story, or where his framework comes from.\n\n## The short version\n\nCoach Farren Brown is the founder of Wesnoski Coaching. He works with men and women on complex functional health cases: autoimmune (Hashimoto's, lupus, RA, MS, Crohn's, UC), hormones (perimenopause, postpartum, low T, PCOS, endometriosis), gut (SIBO, mold, leaky gut, dysbiosis), thyroid, mitochondrial dysfunction (chronic fatigue, EBV, long COVID, fibromyalgia), and recovery from Lyme and CIRS.\n\nHe built the MARCH Method (Mitochondria, Absorption and Detox, Resilience, Cycle and Signal, Healthspan and Strength) as a biology-driven framework that rebuilds the system underneath chronic symptoms in the order biology demands.\n\nBased in Langley, British Columbia, Canada. Serves clients across North America, Europe, the Middle East, and Asia.\n\n## What brought him here\n\nCoach Farren came up through traditional fitness and physique coaching. He kept watching the same pattern play out: clients would hit walls that no calorie tweak or training adjustment could move. The wall was always upstream. Thyroid antibodies climbing quietly while TSH still looked \"normal.\" Gut absorption breaking down behind clean nutrition. Mitochondria depleted. Hormones nobody was reading correctly. Cortisol curves inverted from years of survival mode.\n\nStandard fitness coaching couldn't move any of it, because standard fitness coaching wasn't looking at it. The labs were either never run or interpreted through reference ranges built for sick populations, not optimal ones.\n\nSo he taught himself functional medicine. Lab interpretation. Advanced bloodwork. Peptide protocols. Gut diagnostics. Hormone metabolites. Mitochondrial markers. He built the framework he wished had existed when he was watching clients spin their wheels.\n\n## Why the work is personal\n\nHis own household is part of the story. He's watched the conventional model fail people close to him, in real time. The work isn't theoretical for him. He runs protocols on himself, walks his own cases, and doesn't recommend anything he hasn't either run personally or watched a client through end to end.\n\n## What he stands for\n\n- **Real. Raw. Love.** Operating values across every interaction.\n- **Conscious leadership** over high-pressure sales. Invitation, not command.\n- **Slow work** over quick fixes. The long road, not the transformation pitch.\n- **Walking with clients** through the rebuild instead of handing off a protocol and waving goodbye.\n- **Highest-quality lab analysis** in the space.\n- **No template plans. No stock protocols.** Every case is read on its own terms.\n\n## What he doesn't do\n\n- He doesn't sell transformations.\n- He doesn't guarantee outcomes (the work is real, the outcome depends on the client too).\n- He doesn't titrate prescriptions. Those stay with the physician.\n- He doesn't coach pregnant clients (defers to OB and pregnancy specialists).\n- He doesn't take on cases he can't move. Some cases need a physician first. We hold the line on scope.\n\n## Continuing education\n\nCoach Farren is in active continuing education with multiple practitioner cohorts including Impakt Industries (conscious leadership and operator work under Nick Komodina). The framework is built on independent research, clinical practice, and ongoing study, not pulled from a single certification body.\n\n## When a lead asks \"who is he?\"\n\nDefault phrasing (use as a base, adapt to the convo):\n\n> \"Coach Farren Brown is the founder of Wesnoski Coaching. He built the MARCH Method, which is a functional, biology-driven system for rebuilding metabolism, hormones, gut, and the nervous system in the order biology demands.\n>\n> He works with men and women dealing with the hard stuff: autoimmune, complex hormones, gut chaos, post-viral fatigue, mold and Lyme recovery. Not the simple 'lose 10 pounds before a wedding' cases. The cases where you've been through every other lane and still don't have answers.\n>\n> His clients say the lab analysis alone is the highest quality they've ever seen.\"\n\n## When a lead asks \"what's his background?\"\n\n> \"Coach Farren came up through traditional fitness coaching but kept hitting the same wall: client problems that no training or nutrition adjustment could solve because the breakdown was upstream in the labs, the gut, the hormones, the mitochondria. He taught himself functional medicine and built the MARCH Method out of that gap. His full bio is on the main site at wesnoskicoaching.com.\"\n\nIf they push for credentials, redirect to the main site or tag Coach Farren. Don't invent specifics.\n\n## When a lead asks \"why does he do this?\"\n\n> \"It's personal for him. He watched the conventional model fail people close to him in real time. The work isn't theoretical. He runs protocols on himself and his own family, and he doesn't recommend anything he hasn't either run personally or walked a client through end to end.\"\n\n## Notes for setters and closers\n\n- Never invent specifics about Coach Farren's certifications, years, or credentials. Tag him if you don't know.\n- Always reference the main site (wesnoskicoaching.com) for anything personal or biographical you can't answer.\n- This doc is the source of truth. Coach Farren updates it directly when something needs to change.\n", "status": "live"}, {"id": "bv-pillars", "role": "Brand Voice", "title": "Voice Pillars", "content": "# Brand Voice Pillars\n\nThe Wesnoski Coaching voice in three words:\n\n## Real. Raw. Love.\n\n**Real** means we tell the truth even when it's uncomfortable. We don't sell transformation fantasies. We tell prospects this work is slow, that it's the long road, that the foundation has to come first.\n\n**Raw** means we speak plainly. We use \"brother\" and \"man\" and conversational cadence. We use specific words (\"garbage,\" \"drained,\" \"off\") not polished marketing language. We are imperfect on purpose. We don't sound like an LLM and we don't sound like a corporate funnel.\n\n**Love** means we hold the case. We don't punt to physicians the second something gets hard. We stay in the work with the client. We meet people where they are: tired, skeptical, hopeful, half in and half out. All of it is welcome.\n\n## What this sounds like in practice\n\n- \"Most of the men and women I work with arrive somewhere similar...\"\n- \"The work that holds is the work somebody walks through with you, not the work that gets handed off.\"\n- \"However you arrive, you're welcome here.\"\n- \"The only thing we'd ask is that you be honest. Even if the honest answer is 'I don't know yet.'\"\n", "status": "live"}, {"id": "bv-forbid", "role": "Brand Voice", "title": "Forbidden Phrases", "content": "# Forbidden Phrases\n\nNever use any of these in any DM, email, call script, ad, or social post. They flatten the voice and make us sound generic.\n\n## Banned outright\n\n- **Em dashes.** Use periods, commas, colons, or parentheses instead.\n- **\"Cookie cutter\" or \"cookie-cutter.\"** Replace with \"no template plans,\" \"no stock protocols,\" or \"no generic protocols.\"\n- **\"It's not X, it's Y\" cadence.** Polished, LLM-flavored, kills the voice.\n- **Triads for emotional effect** like \"X, Y, and Z\" used as a punchline. Pick one or two and move on.\n- **Aphorisms or wisdom-stamping.** \"The body keeps the score.\" Skip it.\n- **\"Liposuction\" or \"fat-only correction.\"** Never recommend.\n- **\"Sales call.\"** Use \"the conversation you booked\" or \"the call.\"\n- **\"Closer\" in client-facing copy.** Use \"Client Success Director.\"\n\n## Avoid when possible\n\n- \"genuinely,\" \"honestly,\" \"straightforward\"\n- \"transformation,\" \"journey,\" \"level up\"\n- Excessive emojis. We use them rarely.\n", "status": "live"}, {"id": "bv-approved", "role": "Brand Voice", "title": "Approved Phrases", "content": "# Approved Phrases + Cadence\n\nWhen you're not sure how to say something, lean on these.\n\n## Opening a thread or call\n- \"I want to spend some time with you before...\"\n- \"Most of the men and women I work with arrive somewhere similar.\"\n- \"Here's what's actually going on.\"\n\n## Mechanism framing\n- \"The gap between what your labs say and what your body knows is real.\"\n- \"We rebuild the system underneath the symptoms.\"\n- \"The foundation has to come first.\"\n\n## Pricing + commitment framing\n- \"The work I do is slow. The right work, but the long road, not the quick fix.\"\n- \"I'm not here to sell you a transformation. I'm here to walk with you through a real rebuild.\"\n\n## Booking + qualification\n- \"Sit with this question before the call. Why am I here. Not the polished answer you'd give a doctor. The real one.\"\n- \"However you arrive, you're welcome here. Tired. Skeptical. Hopeful. Half in, half out. All of it is okay.\"\n\n## Setting expectations\n- \"I'm not going to sell you something that doesn't exist.\"\n- \"We don't titrate Rx. We surface markers and questions for the physician.\"\n", "status": "live"}, {"id": "bv-conscious", "role": "Brand Voice", "title": "Conscious Leadership Tone", "content": "# Conscious Leadership Tone\n\nCalibrated after Farren joined Impakt Industries / Nick Komodina's cohort. This is the tone we hold across all client-facing copy, not just landing pages.\n\n## What it means in practice\n- **Invitation, not command.** \"However you are arriving is welcome here.\" Not \"Show up on time.\"\n- **Hold the case.** We don't perform urgency. We hold the work for the long haul.\n- **Permission framing.** \"If that's the work you've been looking for...\" beats \"You need to...\"\n- **No army voice.** No \"let's f**king go,\" no aggression-coded copy, no commanding tone.\n- **No fear tactic language.** No urgency-by-implication, no accusatory framing. Direct + confident + mechanism-anchored. Anti-cookie-cutter, not anti-doctor.\n\n## Where this lives\n- Pre-call page (discover.wesnoskicoaching.com)\n- VSL script\n- Discovery call flow\n- Onboarding emails\n- Check-in messages\n\n## Where this DOES NOT apply\n- Internal team DMs (more casual)\n- Brand voice docs (this one, where we're explicit)\n- KPI dashboards\n", "status": "live"}]</script>
<script>

const TEAM_PASSWORD = 'brown';
function checkAuth() {
  const stored = sessionStorage.getItem('wesnoski-team-auth');
  if (stored === TEAM_PASSWORD) return true;
  document.getElementById('auth-gate').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  return false;
}
function attemptAuth() {
  const input = document.getElementById('auth-input').value.trim().toLowerCase();
  const errorEl = document.getElementById('auth-error');
  if (input === TEAM_PASSWORD) {
    sessionStorage.setItem('wesnoski-team-auth', TEAM_PASSWORD);
    document.getElementById('auth-gate').style.display = 'none';
    document.body.style.overflow = '';
    errorEl.textContent = '';
  } else {
    errorEl.textContent = 'Wrong password. Try again.';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
}
document.getElementById('auth-submit').addEventListener('click', attemptAuth);
document.getElementById('auth-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); attemptAuth(); }
});
checkAuth();


const DOCS = JSON.parse(document.getElementById('docs-data').textContent);
const ROLE_ORDER = ['Home', 'Setter', 'Closer', 'Resources', 'Brand Voice'];
let activeRole = 'Home';
let activeDocId = null;
let searchQuery = '';

function buildRoleTabs() {
  const t = document.getElementById('role-tabs');
  t.innerHTML = '';
  for (const r of ROLE_ORDER) {
    const el = document.createElement('span');
    el.className = 'topbar-tab' + (r === activeRole ? ' active' : '');
    el.textContent = r;
    el.addEventListener('click', () => switchRole(r));
    t.appendChild(el);
  }
}

function switchRole(role) {
  activeRole = role;
  document.querySelectorAll('.topbar-tab').forEach(t => t.classList.toggle('active', t.textContent === role));
  document.getElementById('role-label').textContent = role;
  buildSidebar();
  const first = DOCS.find(d => d.role === role);
  if (first) openDoc(first.id);
}

function buildSidebar() {
  const tree = document.getElementById('sidebar-tree');
  tree.innerHTML = '';
  const roleDocs = DOCS.filter(d => d.role === activeRole);
  for (const doc of roleDocs) {
    const link = document.createElement('a');
    link.className = 'doc-link';
    link.dataset.id = doc.id;
    link.dataset.title = doc.title.toLowerCase();
    const status = doc.status === 'live' ? '<span class="status live">Live</span>' : '<span class="status draft">Draft</span>';
    link.innerHTML = `<span>${doc.title}</span>${status}`;
    link.addEventListener('click', () => openDoc(doc.id));
    tree.appendChild(link);
  }
  applySearch();
}

function openDoc(id) {
  activeDocId = id;
  const doc = DOCS.find(d => d.id === id);
  if (!doc) return;
  if (doc.role !== activeRole) {
    activeRole = doc.role;
    buildRoleTabs();
    document.getElementById('role-label').textContent = activeRole;
    buildSidebar();
  }
  document.querySelectorAll('.doc-link').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  const rendered = marked.parse(doc.content);
  const banner = doc.status === 'draft' ? '<div class="draft-banner"><strong>Draft.</strong> This SOP is a stub. Farren is filling content soon.</div>' : '';
  document.getElementById('main').innerHTML = `
    <div class="breadcrumb">${doc.role} · SOP</div>
    <h1 class="doc-title">${doc.title}</h1>
    <div class="doc-meta">
      <span class="tag role">${doc.role}</span>
      <span class="tag">${doc.status === 'live' ? 'Live' : 'Draft'}</span>
    </div>
    ${banner}
    <div class="content">${rendered}</div>`;
  window.scrollTo({top: 0});
}

function applySearch() {
  document.querySelectorAll('.doc-link').forEach(link => {
    const visible = !searchQuery || link.dataset.title.includes(searchQuery);
    link.classList.toggle('hidden', !visible);
  });
}

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  applySearch();
});

buildRoleTabs();
buildSidebar();
const home = DOCS.find(d => d.role === 'Home') || DOCS[0];
if (home) openDoc(home.id);
</script>
